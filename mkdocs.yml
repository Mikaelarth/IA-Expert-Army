# Sprint RRR — site docs déployable sur GitHub Pages.
# Sources : README.md + docs/*.md + docs/adr/*.md
#
# Build local      : just docs-serve   (http://127.0.0.1:8000)
# Build production : just docs-build   (sortie dans site/)
# Deploy : automatique via .github/workflows/docs.yml sur push main

site_name: IA Expert Army
site_description: >
  Une armée d'agents IA experts spécialisés qui collaborent comme une entreprise
  distribuée. Mémoire partagée vivante, évolution par expérience, autonomie sécurisée.
site_author: MikaelArth (Mike Arthur)
site_url: https://mikaelarth.github.io/IA-Expert-Army/
repo_url: https://github.com/MikaelArth/IA-Expert-Army
repo_name: MikaelArth/IA-Expert-Army
edit_uri: edit/main/docs/
copyright: "Copyright &copy; 2026 MikaelArth — MIT License"

# Le README à la racine est utilisé comme accueil
docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  palette:
    # Mode clair
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre
    # Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair
  font:
    text: Inter
    code: JetBrains Mono
  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - toc.integrate
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Code
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    # Edit page
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

markdown_extensions:
  # Syntaxe étendue
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Lien vers cette section
  # Code highlighting + line numbers + copy button
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  # Tabs
  - pymdownx.tabbed:
      alternate_style: true
  # Task lists
  - pymdownx.tasklist:
      custom_checkbox: true
  # Callouts colorés
  - pymdownx.details
  # Emoji
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - fr
        - en
  - mermaid2:
      version: 11.4.0

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MikaelArth/IA-Expert-Army
      name: Repo GitHub
  generator: false  # cache "Made with Material for MkDocs"

# Navigation explicite (sinon l'ordre alpha est suivi)
