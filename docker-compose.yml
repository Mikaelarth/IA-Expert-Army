# ============================================================
# IA-Expert-Army — Infrastructure locale
# ============================================================
# Usage:
#   docker compose up -d redis chroma          # services minimaux (Phase 1-2)
#   docker compose --profile observability up -d   # + Langfuse (Phase 3+)
#   docker compose down                         # tout arrêter
#
# Données persistées dans ./docker-volumes/ (gitignoré)

name: ia-expert-army

services:

  # --- App : GUI Streamlit complète (v0.9.1, profile app) ---
  # Image autonome pour tester depuis un autre PC du LAN, ou pour préparer
  # un déploiement VPS futur. Cf. docs/deploy-lan.md pour le protocole.
  #
  # Lancement : docker compose --profile app up -d
  # Stop      : docker compose --profile app down
  #
  # Volumes persistants (par défaut sous ./docker-volumes/app/) :
  # - data/    : missions archivées + Chroma + checkpoints + ab_tests
  # - skills/  : skills auto-générées (lecture/écriture)
  # - prompts/ : prompts agents (lecture seule en prod, RW en dev pour A/B)
  # - templates/: templates de missions (lecture seule)
  #
  # Sécurité : 8501 est bound sur LAN ; ce setup N'EST PAS sûr en exposition
  # internet. Pour VPS, ajouter Caddy/Nginx avec basic auth devant.
  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
    image: iaa-app:latest
    container_name: iaa-app
    restart: unless-stopped
    ports:
      # Format : "<host_ip>:<host_port>:<container_port>"
      # 0.0.0.0 = bind sur toutes les interfaces du host (LAN accessible).
      # Pour localhost only, remplacer par "127.0.0.1:8501:8501".
      - "0.0.0.0:8501:8501"
    environment:
      # v0.9.3 — Variables container-aware avec préfixe IAA_CONTAINER_*
      # pour ne PAS hériter du .env du host (où OLLAMA_BASE_URL=localhost…
      # serait toxique car localhost dans le container ≠ host).
      #
      # Override container-only :
      #   IAA_CONTAINER_OLLAMA_URL=http://192.168.1.50:11434/v1  # Ollama remote
      #   IAA_CONTAINER_ENABLE_SANDBOX=true                       # si socket monté
      #
      # Défauts choisis pour LAN+host Ollama : host.docker.internal résolu
      # via add_hosts ci-dessous (Linux) ou natif (Mac/Windows Docker Desktop).
      OLLAMA_BASE_URL: ${IAA_CONTAINER_OLLAMA_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_API_KEY: ollama
      MODEL_STRATEGIC: ${IAA_CONTAINER_MODEL_STRATEGIC:-qwen2.5:32b}
      MODEL_OPERATIONAL: ${IAA_CONTAINER_MODEL_OPERATIONAL:-qwen2.5-coder:32b}
      MODEL_BULK: ${IAA_CONTAINER_MODEL_BULK:-qwen2.5:14b}
      DAILY_BUDGET_USD: ${IAA_CONTAINER_DAILY_BUDGET_USD:-0.0}
      # Sandbox FORCÉ à false en container par défaut : l'API Docker n'est
      # pas exposée au container (sécurité). Override possible via
      # IAA_CONTAINER_ENABLE_SANDBOX=true APRÈS avoir monté /var/run/docker.sock
      # (cf. docs/deploy-lan.md §4).
      ENABLE_SANDBOX: ${IAA_CONTAINER_ENABLE_SANDBOX:-false}
      LOG_LEVEL: ${IAA_CONTAINER_LOG_LEVEL:-INFO}
      LOG_FORMAT: ${IAA_CONTAINER_LOG_FORMAT:-json}
      # A/B testing prompts opt-in (par défaut désactivé en mode déployé)
      AB_TESTING_AGENTS: ${IAA_CONTAINER_AB_TESTING_AGENTS:-}
      # Hot-reload prompts opt-in (utile dev LAN, off en prod)
      HOT_RELOAD_PROMPTS: ${IAA_CONTAINER_HOT_RELOAD_PROMPTS:-false}
      # Sentinelle explicite pour que la page Setup adapte ses messages
      IAA_DEPLOYMENT_MODE: container
    extra_hosts:
      # Sur Linux, force la résolution de `host.docker.internal` vers le host.
      # Sur Mac/Windows Docker Desktop, c'est natif et cette ligne est ignorée.
      - "host.docker.internal:host-gateway"
    volumes:
      # Données runtime — persistées entre restarts du container
      - ./docker-volumes/app/data:/app/data
      # Skills, prompts, templates — partagés avec le host (modifs prises en compte
      # au prochain rerun, ou en hot-reload si HOT_RELOAD_PROMPTS=true)
      - ./skills:/app/skills
      - ./prompts:/app/prompts:ro
      - ./templates:/app/templates:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Redis : bus de messages inter-agents (Phase 3+) ---
  redis:
    image: redis:7-alpine
    container_name: iaa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ./docker-volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Chroma : vector DB (Phase 2+) ---
  # NON démarré par défaut car le projet utilise actuellement Chroma in-process
  # via PersistentClient. Ce container est utile UNIQUEMENT si plusieurs processus
  # doivent partager la mémoire vectorielle (Phase 5+ multi-worker).
  # Active via : docker compose --profile vector-http up -d chroma
  chroma:
    profiles: ["vector-http"]
    image: chromadb/chroma:1.0.13  # v0.7.0 — aligné sur SDK Python >=1.5.9 (cf. pyproject.toml deps base)
    container_name: iaa-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"  # 8001 host pour éviter conflit fréquent sur 8000
    volumes:
      - ./docker-volumes/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE

  # --- Langfuse : observabilité multi-agents (Phase 3+) ---
  #
  # ⛔ STATUS v0.7.0 — DEFERRED (cf. ADR-028).
  # La stack self-hosted v3 ci-dessous N'EST PAS FONCTIONNELLE en l'état :
  # le worker échoue les migrations ClickHouse au premier boot (env vars
  # CLICKHOUSE_MIGRATION_URL et variantes S3 manquantes). Les containers
  # restent ici pour qu'un opérateur avancé puisse les démarrer et finir
  # la config manuellement, mais le projet ne supporte pas ce mode.
  #
  # ✅ Mode supporté : Langfuse cloud (langfuse.com hosted free tier).
  #    Renseigner LANGFUSE_PUBLIC_KEY + LANGFUSE_SECRET_KEY dans .env.
  #    src/core/tracing.py basculera automatiquement.
  #
  # Conditions de réactivation détaillées dans docs/adr/028-langfuse-self-hosted-deferred.md.
  #
  # Lancement (à vos risques) : docker compose --profile observability up -d
  langfuse-postgres:
    profiles: ["observability"]
    image: postgres:16-alpine
    container_name: iaa-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_password_change_me
      POSTGRES_DB: langfuse
    volumes:
      - ./docker-volumes/langfuse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s

  langfuse-clickhouse:
    profiles: ["observability"]
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: iaa-langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse_password_change_me
    # Volume Docker NAMED (pas bind mount) : ClickHouse a des règles de
    # permissions strictes incompatibles avec les mounts Windows bind
    # (erreur "filesystem error: in rename: Permission denied" sur
    # /var/lib/clickhouse/store/...).
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  langfuse-minio:
    profiles: ["observability"]
    image: minio/minio
    container_name: iaa-langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password_change_me
    volumes:
      - ./docker-volumes/langfuse-minio:/data

  langfuse-redis:
    profiles: ["observability"]
    image: redis:7-alpine
    container_name: iaa-langfuse-redis
    restart: unless-stopped
    command: redis-server --requirepass langfuse_redis_change_me

  langfuse-worker:
    profiles: ["observability"]
    image: langfuse/langfuse-worker:3
    container_name: iaa-langfuse-worker
    restart: unless-stopped
    depends_on:
      langfuse-postgres: { condition: service_healthy }
      langfuse-clickhouse: { condition: service_started }
      langfuse-redis: { condition: service_started }
      langfuse-minio: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_password_change_me@langfuse-postgres:5432/langfuse
      # ClickHouse : URL HTTP pour requêtes runtime + URL native (port 9000) pour migrations
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse_password_change_me
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: langfuse_redis_change_me
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minio_password_change_me
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_USE_AZURE_BLOB: "false"
      SALT: 6d0552ea14b4fceedb485b5e6962009d
      ENCRYPTION_KEY: 52dfdc70c48e8bb99742bd51015270aed368a01409bc9135032e43c6302a01fd

  langfuse-web:
    profiles: ["observability"]
    image: langfuse/langfuse:3
    container_name: iaa-langfuse-web
    restart: unless-stopped
    depends_on:
      langfuse-worker: { condition: service_started }
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_password_change_me@langfuse-postgres:5432/langfuse
      # ClickHouse : URL HTTP pour requêtes runtime + URL native (port 9000) pour migrations
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse_password_change_me
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: langfuse_redis_change_me
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minio_password_change_me
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_USE_AZURE_BLOB: "false"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: c184b7b1b45b7e70a2746f86423aed12
      SALT: 6d0552ea14b4fceedb485b5e6962009d
      ENCRYPTION_KEY: 52dfdc70c48e8bb99742bd51015270aed368a01409bc9135032e43c6302a01fd
      TELEMETRY_ENABLED: "false"

# Volume Docker NAMED partagé pour ClickHouse (cf. note dans la définition
# du service langfuse-clickhouse — bind mount Windows incompatible).
volumes:
  langfuse_clickhouse_data:
