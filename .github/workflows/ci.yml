name: CI

# Lance les mêmes hooks que pre-commit local sur chaque push et pull-request,
# pour éviter qu'une PR externe (sans pre-commit installé) ne casse main.
#
# Stratégie : on fait confiance à .pre-commit-config.yaml comme source de
# vérité (DRY). La CI invoque `pre-commit run --all-files` pour ne pas
# dupliquer la liste de hooks ici.
#
# Ce que la CI NE peut PAS valider (validations locales seulement) :
# - sandbox Docker (image iaa-sandbox + container exec)
# - appels LLM réels (daemon Ollama local)
#
# Bascule v0.4.0 (ADR-025) : plus de clé API Anthropic à exposer en CI —
# le backend Ollama est local, les tests unit mockent toujours AsyncOpenAI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents sur la même branche pour économiser
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Sync dependencies
        # --all-extras  : active les [project.optional-dependencies] (PEP 621)
        # --all-groups  : active les [dependency-groups] (PEP 735) — nécessaire
        #                 depuis v0.5.0 pour installer le groupe `gui`
        #                 (streamlit) que les smoke tests AppTest utilisent.
        #                 Sans ça, test_gui_smoke.py skip via importorskip,
        #                 les services GUI ne sont pas couverts, coverage
        #                 tombe sous 90 % en CI alors qu'il est à 91 % localement.
        run: uv sync --all-extras --all-groups

      - name: Run pre-commit (lint + format + checks)
        # On skip pytest-unit, health-check-quick et audit-codebase ici : ils
        # tournent dans des steps séparés pour avoir un feedback distinct dans
        # l'UI GitHub (un step rouge = on sait immédiatement où regarder).
        env:
          SKIP: pytest-unit,health-check-quick,audit-codebase
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run unit + integration test suite
        run: uv run pytest tests/unit/ tests/integration/ -q --tb=short

      # Sprint KKK : gate de couverture 90% lu depuis pyproject.toml
      # [tool.coverage.report].fail_under. Bloque le merge si la couverture
      # globale régresse sous le seuil. ADR-020 documente la politique.
      - name: Coverage gate (90% global, fail on regression)
        run: >
          uv run pytest tests/unit/ tests/integration/
          --cov=src
          --cov-report=term
          --cov-report=xml:coverage.xml
          -q --tb=no

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Run health check (quick mode, no Docker)
        run: uv run python scripts/health_check.py --quick

      # Sprint QQQ : audit anti-pattern bloquant (--strict). Bloque la PR si
      # un nouvel anti-pattern apparaît (file > 500 lignes, test sans assert,
      # TODO orphelin, Opus sans justification, prompt hardcodé).
      # Cf. ADR-022 pour la liste des règles + ADR-023 pour la politique CI.
      # Whitelist : `# audit: ignore <RULE>` à la ligne du finding.
      - name: Audit codebase (anti-patterns)
        run: uv run python scripts/audit_codebase.py --strict

      # v0.7.0 — Build du Dockerfile sandbox sans run (catch les erreurs de
      # syntaxe Dockerfile, deps APT manquantes, dépendances Python pinnées
      # sur des versions retirées de pypi, etc.). On ne lance PAS le container
      # (les vrais tests sandbox restent locaux pour ne pas embarquer Docker-in-
      # Docker sur GitHub-hosted runners). Ce build prend ~30-60s, économise
      # des heures de debug en cas de régression Dockerfile silencieuse.
      - name: Build sandbox image (validation Dockerfile, pas de run)
        run: |
          docker build \
            --tag iaa-sandbox:ci-validation \
            --file infra/docker/sandbox.Dockerfile \
            infra/docker
