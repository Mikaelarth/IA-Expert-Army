# Pre-commit hooks pour IA-Expert-Army
#
# Installation locale (une fois par clone) :
#   uv sync                        # installe pre-commit dans le venv dev
#   uv run pre-commit install      # active les hooks Git côté local
#
# Run manuel sur tous les fichiers :
#   uv run pre-commit run --all-files
#
# Ces hooks s'exécutent automatiquement à `git commit` et bloquent le commit
# si l'un d'eux échoue. Bypass urgence : `git commit --no-verify` (fortement
# déconseillé — l'enjeu est justement de ne RIEN négliger).

repos:
  # === Hooks fondamentaux upstream ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml             # YAML valide (les prompts + docker-compose + ce fichier)
        # mkdocs.yml utilise des tags Python (!!python/name:...) légitimes
        # pour le plugin mermaid2 et l'extension emoji — pas safe-loadable
        # par défaut. --unsafe charge avec yaml.unsafe_load mais reste
        # défensif contre les vraies erreurs YAML (indent, parens, etc.).
        args: ["--unsafe"]
      - id: check-toml             # pyproject.toml valide
      - id: check-merge-conflict   # pas de marqueurs <<<<<<< restants
      - id: check-added-large-files
        args: ["--maxkb=512"]      # bloque les binaires lourds par mégarde
      - id: end-of-file-fixer      # newline final
      - id: trailing-whitespace    # pas d'espaces traînants

  # === Lint + format Python via ruff ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Auto-fix des erreurs ruff fixables (imports, unused, etc.)
      - id: ruff
        args: ["--fix"]
      # Formattage cohérent
      - id: ruff-format

  # NOTE — mypy n'est PAS dans pre-commit (Sprint UU.5)
  # Raison : mypy 2.0 sur `strict = true` trouve 85 erreurs sur la base
  # existante (kwargs `**common: dict[str, object]` dans router.py, decorators
  # untyped sur @observe en mode NO-OP, etc.). On a :
  # 1) baissé strict → false + opt-in granulaire (cf. pyproject.toml)
  # 2) gardé `just typecheck` (justfile) comme check manuel
  # 3) documenté la dette dans le CHANGELOG [Unreleased]
  # À réactiver progressivement, module par module, via `--strict src/X.py`.

  # === Hook custom : tests unit doivent passer ===
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit suite
        entry: uv run pytest tests/unit/ -q --tb=line --no-header
        language: system
        pass_filenames: false       # on lance toujours toute la suite, pas juste les fichiers modifiés
        stages: [pre-commit]
        # Optionnel : limiter aux commits qui touchent du code Python ou tests.
        # Décommenter si la suite devient lente (>30s) :
        # files: '\.(py|toml|cfg)$'

      - id: health-check-quick
        name: IA-Expert-Army health check (quick)
        entry: uv run python scripts/health_check.py --quick
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Sprint QQQ : audit anti-pattern bloquant. Mêmes règles qu'en CI
      # (cf. .github/workflows/ci.yml step "Audit codebase"). Tourne en
      # 1-2s sur tout le repo — acceptable pour pre-commit.
      # Skip ponctuel : SKIP=audit-codebase git commit -m "..."
      # Cf. ADR-022 (règles) + ADR-023 (politique CI/pre-commit).
      - id: audit-codebase
        name: Audit codebase (anti-patterns Sprint LLL)
        entry: uv run python scripts/audit_codebase.py --strict
        language: system
        pass_filenames: false
        stages: [pre-commit]
